<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="./static/css/style.css">
</head>
<body>
    
    <div class="container-fluid p-0 vh-100">

        <div class="row g-0 h-100">
<div class="col-5 bg-brand d-flex flex-column justify-content-center align-items-center text-white h-100 p-5">
    
    <div class="logo-box mb-4">
        <span class="fs-1 fw-bold">MB</span>
    </div>
    
    <h1 class="fw-bold mb-2">MyBar</h1>
    <p class="text-center mt-2">Sistemas de bares <br> e restaurantes</p>
    
</div>
            
            <div class="col-7 bg-light d-flex justify-content-center align-items-center ">
                <div class="w-100 px-4" style="max-width: 400px;">
                    <h2 class="fw-bold mb-1 text-dark">Entrar no Sitema</h2>
                    <p class="text-muted small border-bottom mb-4 pb-3">Acesse com suas credencias</p>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label text-muted small fw-medium mb-1">E-mail</label>
                            <input type="email" name="email" class="form-control  bg-white" id="email" placeholder="nome@empresa.com.br" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label text-muted small fw-medium mb-1">Senha</label>
                            <input type="password" name="password" id="password" placeholder="*****" class="form-control bg-white" required>
                        </div>
                        <button type="submit" class="btn btn-brand w-100 py-2  mb-3 fw-semibold">Entrar no sistema</button>
                        <div class="text-center mt-3">
                        <a href="#" class="text-muted small text-decoration-none">Esqueceu a senha? Contate o administrador.</a>
                        </div>
                    </form>

                </div>
            
            </div>
        </div>

    </div>


    <script src="./assets/bootstrap/bootstrap.bundle.js"></script>
</body>


</html>
