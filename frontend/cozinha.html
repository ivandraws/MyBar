<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle da Cozinha</title>
    <link rel="stylesheet" href="./assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="./static/css/style.css">
    <link rel="stylesheet" href="./static/css/cozinha.css">
</head>
<body>
    <div class="app-wrapper d-flex vh-100">

        <!-- ===================== SIDEBAR ===================== -->
        <aside class="sidebar bg-white border-end d-flex flex-column" style="width: 250px; flex-shrink: 0;">
            <div class="p-4 d-flex align-items-center gap-3 border-bottom">
                <div class="bg-brand text-white rounded d-flex justify-content-center align-items-center" style="width: 40px; height: 40px; font-weight: bold;">MB</div>
                <div>
                    <h5 class="m-0 fw-bold text-dark">MyBar</h5>
                    <small class="text-taupe">Gerenciador</small>
                </div>
            </div>

            <nav class="flex-grow-1 p-3 d-flex flex-column gap-1">
                <a href="./dashboard.html" class="nav-link py-2 px-3 rounded">Dashboard</a>
                <a href="./contas.html" class="nav-link py-2 px-3 rounded">Contas</a>
                <a href="./cardapio.html" class="nav-link py-2 px-3 rounded">Cardápio</a>
                <a href="./cozinha.html" class="nav-link active py-2 px-3 rounded">Cozinha</a>
                <a href="./entregas.html" class="nav-link py-2 px-3 rounded">Entregas</a>
                <a href="./configuracao.html" class="nav-link py-2 px-3 rounded">Configuração</a>
                <a href="./usuarios.html" class="nav-link py-2 px-3 rounded">Usuários</a>
                <a href="./relatorio.html" class="nav-link py-2 px-3 rounded">Relatório</a>
            </nav>

            <div class="p-3 border-top d-flex align-items-center gap-3">
                <div id="user-avatar" class="bg-brand text-white rounded-circle d-flex justify-content-center align-items-center fw-bold" style="width: 36px; height: 36px; flex-shrink: 0;">A</div>
                <a href="#" onclick="logout(); return false;" title="Clique para sair">
                <div>
                    <span id="user-name" class="d-block fw-bold text-dark" style="font-size: 0.9rem;">Admin</span>
                    <small id="user-role" class="text-taupe">Administrador</small>
                </div></a>
            </div>
        </aside>

        <!-- ===================== CONTEÚDO PRINCIPAL ===================== -->
        <main class="d-flex flex-column flex-grow-1 overflow-hidden">

            <header class="top-bar p-3 border-bottom d-flex align-items-center justify-content-between bg-white">
                <div>
                    <h3 class="fw-bold text-main mb-0">Controle da Cozinha</h3>
                    <small class="text-taupe">Pedidos em tempo real</small>
                </div>
            </header>

            <div class="d-flex flex-column flex-grow-1 overflow-auto p-3 gap-3">

                <!-- Filtros: Todos / Solicitado / Em Preparo / Entregue -->
                <!-- O atributo data-filtro guarda a "chave" usada no JS (sem espaço, sem acento) -->
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-filtro active" data-filtro="todos">Todos <span class="contador" id="contador-todos"></span></button>
                    <button type="button" class="btn btn-filtro" data-filtro="solicitado">Solicitado <span class="contador" id="contador-solicitado"></span></button>
                    <button type="button" class="btn btn-filtro" data-filtro="emPreparo">Em Preparo <span class="contador" id="contador-emPreparo"></span></button>
                    <button type="button" class="btn btn-filtro" data-filtro="entregue">Entregue <span class="contador" id="contador-entregue"></span></button>
                </div>

                <!-- Quadro com as 3 colunas -->
                <div class="d-flex gap-3 flex-grow-1" id="quadro-cozinha">

                    <div class="coluna-cozinha" data-coluna="solicitado">
                        <div class="coluna-header coluna-solicitado">
                            Solicitado <span class="coluna-contador" id="coluna-contador-solicitado"></span>
                        </div>
                        <div class="coluna-body" id="coluna-body-solicitado"></div>
                    </div>

                    <div class="coluna-cozinha" data-coluna="emPreparo">
                        <div class="coluna-header coluna-em-preparo">
                            Em Preparo <span class="coluna-contador" id="coluna-contador-emPreparo"></span>
                        </div>
                        <div class="coluna-body" id="coluna-body-emPreparo"></div>
                    </div>

                    <div class="coluna-cozinha" data-coluna="entregue">
                        <div class="coluna-header coluna-entregue">
                            Entregue <span class="coluna-contador" id="coluna-contador-entregue"></span>
                        </div>
                        <div class="coluna-body" id="coluna-body-entregue"></div>
                    </div>

                </div>

            </div>
        </main>
    </div>

    <script src="./assets/bootstrap/bootstrap.bundle.js"></script>
    <script src="./static/js/script.js"></script>
    <script src="./static/js/cozinha.js"></script>
</body>
</html>
