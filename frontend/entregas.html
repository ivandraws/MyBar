<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Entregas</title>
    <link rel="stylesheet" href="./assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="./static/css/style.css">
    <link rel="stylesheet" href="./static/css/contas.css">
    <link rel="stylesheet" href="./static/css/entregas.css">
</head>
<body>
    <div class="app-wrapper d-flex vh-100">

        <!-- ===================== SIDEBAR ===================== -->
        <aside class="sidebar bg-white border-end d-flex flex-column" style="width: 250px; flex-shrink: 0;">
            <div class="p-4 d-flex align-items-center gap-3 border-bottom">
                <div class="bg-brand text-white rounded d-flex justify-content-center align-items-center" style="width: 40px; height: 40px; font-weight: bold;">MB</div>
                <div>
                    <h5 class="m-0 fw-bold text-dark">MyBar</h5>
                    <small class="text-taupe">Gerenciador</small>
                </div>
            </div>

            <nav class="flex-grow-1 p-3 d-flex flex-column gap-1">
                <a href="./dashboard.html" class="nav-link py-2 px-3 rounded">Dashboard</a>
                <a href="./contas.html" class="nav-link py-2 px-3 rounded">Contas</a>
                <a href="./cardapio.html" class="nav-link py-2 px-3 rounded">Cardápio</a>
                <a href="./cozinha.html" class="nav-link py-2 px-3 rounded">Cozinha</a>
                <a href="./entregas.html" class="nav-link active py-2 px-3 rounded">Entregas</a>
                <a href="./configuracao.html" class="nav-link py-2 px-3 rounded">Configuração</a>
                <a href="./usuarios.html" class="nav-link py-2 px-3 rounded">Usuários</a>
                <a href="./relatorio.html" class="nav-link py-2 px-3 rounded">Relatório</a>
            </nav>

            <div class="p-3 border-top d-flex align-items-center gap-3">
                <div id="user-avatar" class="bg-brand text-white rounded-circle d-flex justify-content-center align-items-center fw-bold" style="width: 36px; height: 36px; flex-shrink: 0;">A</div>
                <a href="#" onclick="logout(); return false;" title="Clique para sair">
                <div>
                    <span id="user-name" class="d-block fw-bold text-dark" style="font-size: 0.9rem;">Admin</span>
                    <small id="user-role" class="text-taupe">Administrador</small>
                </div></a>
            </div>
        </aside>

        <!-- ===================== CONTEÚDO PRINCIPAL ===================== -->
        <main class="d-flex flex-column flex-grow-1 overflow-hidden">

            <header class="top-bar p-3 border-bottom d-flex align-items-center justify-content-between bg-white">
                <div>
                    <h3 class="fw-bold text-main mb-0">Controle de Entregas</h3>
                    <small class="text-taupe">Recebimento e entrega de pedidos aos garçons</small>
                </div>
            </header>

            <div class="d-flex flex-column flex-grow-1 overflow-auto p-3 gap-3">

                <!-- Pesquisar Pedidos (Conta / Cliente) -->
                <div class="card border-0 shadow-sm rounded-4 p-3">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label text-muted small fw-medium mb-1">Conta</label>
                            <input type="number" id="filtro-conta" class="form-control" placeholder="Ex: 120">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted small fw-medium mb-1">Cliente</label>
                            <input type="text" id="filtro-cliente" class="form-control" placeholder="Ex: Raimundo Moura">
                        </div>
                        <div class="col-md-2">
                            <button type="button" id="btn-pesquisar" class="btn btn-brand fw-semibold w-100">Pesquisar</button>
                        </div>
                    </div>
                </div>

                <!-- Tabela de Pedidos -->
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="card-body p-0">
                        <table class="table align-middle mb-0">
                            <thead>
                                <tr class="text-taupe small">
                                    <th class="ps-4">Conta</th>
                                    <th>Tipo</th>
                                    <th>Descrição</th>
                                    <th>Data e Hora</th>
                                    <th>Status</th>
                                    <th>Comandos</th>
                                </tr>
                            </thead>
                            <tbody id="pedidos-tbody">
                                <!-- O JavaScript vai preencher essas linhas -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Formulário: Registrar Entrega -->
                <div class="card border-0 shadow-sm rounded-4 p-3" id="card-registrar-entrega">
                    <h6 class="fw-bold text-main mb-3">Registrar Entrega</h6>

                    <!-- Mostra qual pedido está sendo entregue, depois que o atendente clica em "Entregar" -->
                    <div id="info-pedido-selecionado" class="text-taupe small mb-3 d-none">
                        Entregando: <strong id="texto-pedido-selecionado"></strong>
                    </div>

                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label text-muted small fw-medium mb-1">Código Garçom</label>
                            <input type="number" id="codigo-garcom" class="form-control" placeholder="Ex: 1001">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label text-muted small fw-medium mb-1">Nome Garçom</label>
                            <input type="text" id="nome-garcom" class="form-control" placeholder="Preenchido automaticamente" readonly>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-muted small fw-medium mb-1">Código Atendente</label>
                            <input type="number" id="codigo-atendente" class="form-control" placeholder="Ex: 1010">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label text-muted small fw-medium mb-1">Senha Atendente</label>
                            <input type="password" id="senha-atendente" class="form-control" placeholder="****">
                        </div>
                        <div class="col-md-2">
                            <button type="button" id="btn-registrar-entrega" class="btn btn-brand fw-semibold w-100">Registrar Entrega</button>
                        </div>
                    </div>

                    <div id="erro-registrar-entrega" class="text-danger small mt-2 d-none"></div>
                </div>

            </div>
        </main>
    </div>

    <script src="./assets/bootstrap/bootstrap.bundle.js"></script>
    <script src="./static/js/script.js"></script>
    <script src="./static/js/entregas.js"></script>
</body>
</html>
