<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="./assets/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="./static/css/style.css">
</head>
<body>
    <div class="app-wrapper d-flex vh-100">
<aside class="sidebar bg-white border-end d-flex flex-column" style="width: 250px; flex-shrink: 0;">
    
    <div class="p-4 d-flex align-items-center gap-3 border-bottom">
        <div class="bg-brand text-white rounded d-flex justify-content-center align-items-center" style="width: 40px; height: 40px; font-weight: bold;">MB</div>
        <div>
            <h5 class="m-0 fw-bold text-dark">MyBar</h5>
            <small class="text-taupe">Gerenciador</small>
        </div>
    </div>

    <nav class="flex-grow-1 p-3 d-flex flex-column gap-1">
        <a href="#" class="nav-link active py-2 px-3 rounded text-decoration-none">Dashboard</a>
        <a href="#" class="nav-link py-2 px-3 rounded text-decoration-none">Contas</a>
        <a href="#" class="nav-link py-2 px-3 rounded text-decoration-none">Cardápio</a>
        <a href="#" class="nav-link py-2 px-3 rounded text-decoration-none">Cozinha</a>
        <a href="#" class="nav-link py-2 px-3 rounded text-decoration-none">Relatórios</a>
    </nav>

    <div class="p-3 border-top d-flex align-items-center gap-3">
    <div id="user-avatar" class="bg-light rounded-circle d-flex justify-content-center align-items-center" style="width: 40px; height: 40px;">A</div>
    <div id="user-info">
        <a href="login.html" id="user-name" class="d-block fw-bold text-dark text-decoration-none">Admin</a>
        <small id="user-role" class="text-taupe">Administrador</small>
    </div>
</div>
</aside>

    <main class="d-flex flex-column flex-grow-1 overflow-hidden">
        <header class="top-bar p-3 border-bottom">
        </header>

      <div class="d-flex flex-column flex-grow-1 gap-4">
    
   <div class="row g-3">
    <div class="col-4">
        <div class="card p-4 border-0 shadow-sm card-brand">
            <small class="text-taupe">Contas Abertas</small>
            <h2 class="fw-bold text-main my-2">24</h2>
            <small class="text-brand">+3 abertas agora</small>
        </div>
    </div>

    <div class="col-4">
        <div class="card p-4 border-0 shadow-sm card-teal">
            <small class="text-taupe">Faturamento Hoje</small>
            <h2 class="fw-bold text-main my-2">R$ 4.820</h2>
            <small style="color: var(--brand-teal);">+12% vs ontem</small>
        </div>
    </div>

    <div class="col-4">
        <div class="card p-4 border-0 shadow-sm card-sage">
            <small class="text-taupe">Fila Cozinha</small>
            <h2 class="fw-bold text-main my-2">7</h2>
            <small style="color: var(--brand-sage);">2 com atraso</small>
        </div>
    </div>
</div>

    <div class="card p-4 border-0 shadow-sm rounded-4">
        <table class="table align-middle">
            <thead>
                <tr class="text-taupe small">
                    <th>Nº</th>
                    <th>Cliente</th>
                    <th>Garçom</th>
                    <th>Itens</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="pedidos-tbody">
                </tbody>
        </table>
    </div>
</div>
    </main>
    </div>
</body>
</html>
